<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>123</title>
    <style>
        * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

.tid-skipper-v1,
.tid-skipper-v2,
.user-skipper-v1,
.user-skipper-v2 {
    width: 90%;
    max-width: 500px;
    margin: 1rem auto;
    padding: 1rem;
    background: #f5f5f5;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

.skip-input1,
.skip-input2,
.skip-input3,
.skip-input4 {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 16px;
    resize: vertical;
    min-height: 40px;
}

.skip-button1,
.skip-button2,
.skip-button3,
.skip-button4,
.mode-switcher2,
.mode-switcher4 {
    padding: 12px 24px;
    margin: 8px 4px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
}



.skip-button1,
.skip-button2,
.skip-button3,
.skip-button4 {
    background: #007bff;
    color: white;
}

.skip-button1:hover,
.skip-button2:hover,
.skip-button3:hover,
.skip-button4:hover {
    background: #0056b3;
}


.mode-switcher2,
.mode-switcher4 {
    background: #28a745;
    color: white;
}

.mode-switcher2:hover,
.mode-switcher4:hover {
    background: #218838;
}

@media (min-width:768px) {

    .tid-skipper-v1,
    .tid-skipper-v2,
    .user-skipper-v2 {
        width: 70%;
        margin: 2rem auto;
        padding: 1.5rem;
    }

    .skip-input1,
    .skip-input2,
    .skip-input3,
    .skip-input4 {
        font-size: 18px;
        padding: 14px;
    }

    .tid-skipper-v2>button,
    .user-skipper-v2>button {
        display: inline-block;
        width: auto;
    }
}

@media (max-width:480px) {

    .skip-button1,
    .skip-button2,
    .skip-button3,
    .skip-button4,
    .mode-switcher2,
    .mode-switcher4 {
        width: 100%;
        margin: 8px 0;
    }
}
    </style>
</head>
<body>
<script src="KLPTID.js"></script>
<script>
    const skipper1 = new TidSkipper1();
    const skipper2 = new TidSkipper2();
    const skipper3 = new UserSkipper1();
    const skipper4 = new UserSkipper2();
</script> 
</body>
</html>
